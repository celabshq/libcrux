name: secrets - Build & Test

on:
  merge_group:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev", "*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'merge_group' }}
    defaults:
      run:
        shell: bash
        working-directory: crates/utils/secrets

    steps:
      - uses: actions/checkout@v6

      # Build ...

      - name: 🔨 Build
        run: |
          rustc --print=cfg
          cargo build --verbose

      - name: 🔨 Build Release
        run: cargo build --verbose --release

      # Test ...

      - name: 🏃🏻‍♀️ Test
        run: |
          cargo clean
          cargo test --verbose

      - name: 🏃🏻‍♀️ Test Release
        run: |
          cargo clean
          cargo test --verbose --release

      - name: 🏃🏻‍♀️ Test Secret Independence
        run: |
          cargo clean
          cargo test --verbose --features check-secret-independence

      - name: 🏃🏻‍♀️ Test Release Secret Independence
        run: |
          cargo clean
          cargo test --verbose --release --features check-secret-independence
          
      - name: 🏃🏻‍♀️ Test Portable
        run: |
          cargo clean
          LIBCRUX_DISABLE_SIMD128=1 LIBCRUX_DISABLE_SIMD256=1 cargo test --verbose

      - name: 🏃🏻‍♀️ Test Portable Release
        run: |
          cargo clean
          LIBCRUX_DISABLE_SIMD128=1 LIBCRUX_DISABLE_SIMD256=1 cargo test --verbose --release $RUST_TARGET_FLAG

  build-no_std:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: crates/algorithms/aesgcm

    steps:
      - uses: actions/checkout@v6

      - name: Add no_std target
        run: rustup target add thumbv6m-none-eabi

      - name: Update dependencies
        run: cargo update

      - name: 🔨 Build
        run: |
          rustc --print=cfg
          cargo check --lib --verbose --target thumbv6m-none-eabi

  valgrind-ct-test:
    if: ${{ github.event_name != 'merge_group' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
        features:
          - ""
          - "--features check-secret-independence"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: crates/utils/secrets
    env:
      RUSTFLAGS: '--cfg valgrind_ct_test'
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: 'valgrind --tool=memcheck --error-exitcode=1 --track-origins=yes'
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUNNER: 'valgrind --tool=memcheck --error-exitcode=1 --track-origins=yes'

    steps:
      - uses: actions/checkout@v6

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: 🏃🏻‍♀️ Test under valgrind
        run: cargo test --verbose --profile release-debug ${{ matrix.features }}

  secrets-build-test-status:
    if: ${{ always() }}
    needs: [build, build-no_std, valgrind-ct-test]
    runs-on: ubuntu-latest
    steps:
      - name: Successful
        if: ${{ !(contains(needs.*.result, 'failure')) }} 
        run: exit 0 
      - name: Failing
        if: ${{ (contains(needs.*.result, 'failure')) }} 
        run: exit 1 
