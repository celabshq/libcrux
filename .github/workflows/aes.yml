name: AES-AEADs

on:
  merge_group:
  pull_request:
    branches: ["main", "dev", "*"]
    paths:
      - "crates/algorithms/aes/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: linux
    defaults:
      run:
        shell: bash
        working-directory: crates/algorithms/aes

    steps:
      - uses: actions/checkout@v6

      - name: Update dependencies
        run: cargo update

      # Build ...

      - name: 🔨 Build
        run: |
          rustc --print=cfg
          cargo build --lib --examples --benches --verbose

      - name: 🔨 Build Release
        run: cargo build --lib --examples --benches --verbose --release

      # Test ...

      - name: 🏃🏻‍♀️ Test
        run: |
          cargo clean
          cargo test --verbose

      - name: 🏃🏻‍♀️ Test Release
        run: |
          cargo clean
          cargo test --verbose --release

      - name: 🏃🏻‍♀️ Test Portable
        run: |
          cargo clean
          LIBCRUX_DISABLE_SIMD128=1 LIBCRUX_DISABLE_SIMD256=1 cargo test --verbose

      - name: 🏃🏻‍♀️ Test Portable Release
        run: |
          cargo clean
          LIBCRUX_DISABLE_SIMD128=1 LIBCRUX_DISABLE_SIMD256=1 cargo test --verbose --release

  fuzz:
    runs-on: linux
    defaults:
      run:
        shell: bash
        working-directory: crates/algorithms/aes

    steps:
      - uses: actions/checkout@v6

      - name: 🛠️ Setup Rust Nightly
        run: |
          rustup toolchain install nightly
          cargo install cargo-fuzz

      - name: 🛠️ Update dependencies
        run: cargo update

      - name: 🏃🏻‍♀️ Encrypt256
        run: CARGO_PROFILE_RELEASE_LTO=false cargo +nightly fuzz run encrypt128 -- -runs=100000

      - name: 🏃🏻‍♀️ Encrypt256
        run: CARGO_PROFILE_RELEASE_LTO=false cargo +nightly fuzz run encrypt256 -- -runs=100000
